name: Release (publish to npm)

# Publishes @hubex/tokens, @hubex/css, @hubex/react to the public npm registry.
# Runs when a version tag (v*) is pushed, or manually via the Actions tab.
#
# ONE-TIME SETUP (done by a human):
#   1. Create the npm org / scope "hubex" on npmjs.com and log in.
#   2. Create an npm "Automation" access token (npmjs.com -> Access Tokens).
#   3. Add it to this repo: Settings -> Secrets and variables -> Actions ->
#      New repository secret, name it NPMJS_TOKEN. This is a GitHub Actions
#      SECRET (repo settings), NOT a .env file — a .env is never read by CI.
# After that, pushing a tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`)
# publishes any package whose version isn't already on npm.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build
        env:
          NODE_OPTIONS: "--max-old-space-size=3072"

      - name: Run tests
        run: pnpm test
        env:
          NODE_OPTIONS: "--max-old-space-size=3072"

      # changeset publish replaces workspace:* ranges with real versions and
      # publishes only packages whose version is not yet on the registry.
      - name: Publish to npm
        run: pnpm exec changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPMJS_TOKEN }}
